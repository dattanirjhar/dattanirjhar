<svg xmlns="http://www.w3.org/2000/svg" width="900" height="540" viewBox="0 0 900 540">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0"
            stroke="#000" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="1" y="1" rx="12" ry="12" width="898" height="538" fill="#000000" stroke="#003300" stroke-width="1"/>
  <g filter="url(#glow)">
    <text x="28" y="42" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">root@dattanirjhar:~# ls -la projects/</text>
    <text x="28" y="98" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">projects/</text>
    <text x="28" y="154" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">├── Genesis/</text>
    <text x="28" y="182" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── AI-assisted Penetration Testing Platform</text>
    <text x="28" y="210" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── Multi-Agent Architecture</text>
    <text x="28" y="238" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── Local LLM Infrastructure</text>
    <text x="28" y="266" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── Knowledge Engine</text>
    <text x="28" y="294" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   └── Automated Reporting</text>
    <text x="28" y="322" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│</text>
    <text x="28" y="350" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">├── AI-NIDS/</text>
    <text x="28" y="378" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── ML Intrusion Detection System</text>
    <text x="28" y="406" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   └── Flask Dashboard</text>
    <text x="28" y="434" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│</text>
    <text x="28" y="462" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">└── Portfolio/</text>
    <text x="28" y="490" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">    └── nirjharverse.netlify.app</text>
  </g>
  <rect width="900" height="540"
        fill="url(#scanlines)" pointer-events="none"/>
  <rect x="300.8" y="477"
        width="9" height="16"
        fill="#39FF14">
    <animate attributeName="opacity"
             values="1;1;0;0" dur="1.2s"
             repeatCount="indefinite"/>
  </rect>
</svg>