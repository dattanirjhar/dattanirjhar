<svg xmlns="http://www.w3.org/2000/svg" width="900" height="344" viewBox="0 0 900 344">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0"
            stroke="#000" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="1" y="1" rx="12" ry="12" width="898" height="342" fill="#000000" stroke="#003300" stroke-width="1"/>
  <g filter="url(#glow)">
    <text x="28" y="42" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">root@dattanirjhar:~# exec // socials</text>
    <text x="28" y="98" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">curl -s https://instagram.com/inksplashedtshirt</text>
    <text x="28" y="126" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  ✓ Connected — @inksplashedtshirt</text>
    <text x="28" y="182" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">curl -s https://linkedin.com/in/nirjhardatta</text>
    <text x="28" y="210" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  ✓ Connected — Nirjhar Datta</text>
    <text x="28" y="266" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">ping dattanirjhar15@gmail.com</text>
    <text x="28" y="294" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  ✓ REPLY — 64 bytes from mail.google.com: ttl=128</text>
  </g>
  <rect width="900" height="344"
        fill="url(#scanlines)" pointer-events="none"/>
  <rect x="452.0" y="281"
        width="9" height="16"
        fill="#39FF14">
    <animate attributeName="opacity"
             values="1;1;0;0" dur="1.2s"
             repeatCount="indefinite"/>
  </rect>
</svg>