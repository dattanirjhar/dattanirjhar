<svg xmlns="http://www.w3.org/2000/svg" width="900" height="484" viewBox="0 0 900 484">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0"
            stroke="#000" stroke-width="1" opacity="0.08"/>
    </pattern>
    <marker id="arrow" markerWidth="8" markerHeight="6"
            refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#005F00"/>
    </marker>
  </defs>
  <rect x="1" y="1" rx="12" ry="12" width="898" height="482" fill="#000000" stroke="#003300" stroke-width="1"/>
  <g filter="url(#glow)">
    <text x="28" y="42" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">root@dattanirjhar:~# tail academic.log</text>
    <text x="28" y="98" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">[EDU]  B.Tech, Computer Science — Cybersecurity Specialization</text>
    <text x="28" y="126" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">[ORG]  DIT University · Expected Graduation 2026</text>
