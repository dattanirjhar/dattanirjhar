    <text x="28" y="266" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  - Cryptography, secure algorithm design, adversarial resilience</text>
    <text x="28" y="294" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  - Network security, IPSec, firewall architecture</text>
    <text x="28" y="322" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  - AI ethics &amp; adversarial search theory</text>
    <text x="28" y="378" fill="#005F00" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14"># LEARNING PIPELINE</text>
    <rect x="28.0" y="392" width="194.5" height="28" rx="6" fill="#051005" stroke="#003300"/>
    <text x="125.2" y="408" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="12" text-anchor="middle">Foundations</text>
    <line x1="224.5" y1="406.0" x2="242.5" y2="406.0" stroke="#005F00" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="244.5" y="392" width="194.5" height="28" rx="6" fill="#051005" stroke="#003300"/>
    <text x="341.8" y="408" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="12" text-anchor="middle">Deep Learning</text>
    <line x1="441.0" y1="406.0" x2="459.0" y2="406.0" stroke="#005F00" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="461.0" y="392" width="194.5" height="28" rx="6" fill="#051005" stroke="#003300"/>
    <text x="558.2" y="408" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="12" text-anchor="middle">Adversarial ML</text>
    <line x1="657.5" y1="406.0" x2="675.5" y2="406.0" stroke="#005F00" stroke-width="1.5" marker-end="url(#arrow)"/>
    <rect x="677.5" y="392" width="194.5" height="28" rx="6" fill="#051005" stroke="#003300"/>
    <text x="774.8" y="408" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="12" text-anchor="middle">Applied Security</text>
