<svg xmlns="http://www.w3.org/2000/svg" width="900" height="260" viewBox="0 0 900 260">
  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0"
            stroke="#000" stroke-width="1" opacity="0.08"/>
    </pattern>
  </defs>
  <rect x="1" y="1" rx="12" ry="12" width="898" height="258" fill="#000000" stroke="#003300" stroke-width="1"/>
  <g filter="url(#glow)">
    <text x="28" y="42" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">root@dattanirjhar:~# exit</text>
    <line x1="28" y1="93" x2="872" y2="93" stroke="#005F00" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
    <text x="28" y="154" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">[ CONNECTION SECURE ]   [ SESSION LOGGED ]   [ THANKS FOR STOPPING BY ]</text>
    <line x1="28" y1="205" x2="872" y2="205" stroke="#005F00" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
  </g>
  <rect width="900" height="260"
        fill="url(#scanlines)" pointer-events="none"/>
  <rect x="628.4" y="141"
        width="9" height="16"
        fill="#39FF14">
    <animate attributeName="opacity"
             values="1;1;0;0" dur="1.2s"
             repeatCount="indefinite"/>
  </rect>
</svg>