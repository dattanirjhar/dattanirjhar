<svg width="800" height="373" viewBox="0 0 800 373" xmlns="http://www.w3.org/2000/svg">
<rect width="800" height="373" fill="#0D1117"/>
<text x="20" y="35" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#39FF14" xml:space="preserve">$ whoami</text>
<text x="20" y="61" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve"></text>
<text x="20" y="87" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">At the adversarial frontier of AI, robotics, and cybersecurity —</text>
<text x="20" y="113" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">I teach machines how to see, think, and deceive,</text>
<text x="20" y="139" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">then I architect the systems to defend against them.</text>
<text x="20" y="165" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve"></text>
<text x="20" y="191" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">I operate where AI, cybersecurity, and robotics collide. My work</text>
<text x="20" y="217" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">is a meditation on perception — coding machines to interpret the</text>
<text x="20" y="243" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">world while questioning the authenticity of the digital reflection.</text>
<text x="20" y="269" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve"></text>
<text x="20" y="295" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">Fascinated by the boundary between simulation and understanding —</text>
<text x="20" y="321" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">the moment an algorithm stops imitating intelligence and starts</text>
<text x="20" y="347" font-family="Fira Code, Consolas, monospace" font-size="15" fill="#00FF41" xml:space="preserve">to reason.</text>
</svg>