<svg xmlns="http://www.w3.org/2000/svg" width="900" height="582" viewBox="0 0 900 582">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" rx="12" ry="12" width="898" height="580" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <clipPath id="headerClip"><rect width="900" height="42" rx="12" ry="12"/></clipPath>
  <rect width="900" height="42" fill="#161B22" clip-path="url(#headerClip)"/>
  <rect y="30" width="900" height="12" fill="#161B22"/>
  <line x1="0" y1="42" x2="900" y2="42" stroke="#30363D" stroke-width="1"/>
  <circle cx="20" cy="21" r="6" fill="#FF5F56"/>
  <circle cx="40" cy="21" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="21" r="6" fill="#27C93F"/>
  <text x="450" y="25" fill="#8B949E" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="13" text-anchor="middle">root@dattanirjhar:~</text>
  <g filter="url(#glow)">
    <text x="28" y="84" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">root@dattanirjhar:~# ls -la projects/</text>
    <text x="28" y="140" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">projects/</text>
    <text x="28" y="196" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">├── Genesis/</text>
    <text x="28" y="224" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── AI-assisted Penetration Testing Platform</text>
    <text x="28" y="252" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── Multi-Agent Architecture</text>
    <text x="28" y="280" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── Local LLM Infrastructure</text>
    <text x="28" y="308" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── Knowledge Engine</text>
    <text x="28" y="336" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   └── Automated Reporting</text>
    <text x="28" y="364" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│</text>
    <text x="28" y="392" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">├── AI-NIDS/</text>
    <text x="28" y="420" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   ├── ML Intrusion Detection System</text>
    <text x="28" y="448" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│   └── Flask Dashboard</text>
    <text x="28" y="476" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">│</text>
    <text x="28" y="504" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">└── Portfolio/</text>
    <text x="28" y="532" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">    └── nirjharverse.netlify.app</text>
  </g>

  <defs>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0"
            stroke="#000000" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="900" height="582"
        fill="url(#scanlines)" pointer-events="none"/>

  <rect x="300.8" y="519"
        width="9" height="16"
        fill="#00FF41">
    <animate attributeName="opacity"
             values="1;1;0;0" dur="1.2s"
             repeatCount="indefinite"/>
  </rect>
</svg>