<svg xmlns="http://www.w3.org/2000/svg" width="900" height="414" viewBox="0 0 900 414">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" rx="12" ry="12" width="898" height="412" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <clipPath id="headerClip"><rect width="900" height="42" rx="12" ry="12"/></clipPath>
  <rect width="900" height="42" fill="#161B22" clip-path="url(#headerClip)"/>
  <rect y="30" width="900" height="12" fill="#161B22"/>
  <line x1="0" y1="42" x2="900" y2="42" stroke="#30363D" stroke-width="1"/>
  <circle cx="20" cy="21" r="6" fill="#FF5F56"/>
  <circle cx="40" cy="21" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="21" r="6" fill="#27C93F"/>
  <text x="450" y="25" fill="#8B949E" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="13" text-anchor="middle">root@dattanirjhar:~</text>
  <g filter="url(#glow)">
    <text x="28" y="84" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">root@dattanirjhar:~# tail academic.log</text>
    <text x="28" y="140" fill="#58A6FF" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">[EDU]  B.Tech, Computer Science — Cybersecurity Specialization</text>
    <text x="28" y="168" fill="#58A6FF" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">[ORG]  DIT University · Expected Graduation 2026</text>
    <text x="28" y="224" fill="#6E7681" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14"># FOCUS AREAS</text>
    <line x1="28" y1="247" x2="872" y2="247" stroke="#6E7681" stroke-width="1" stroke-dasharray="4,6" opacity="0.5"/>
    <text x="28" y="280" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  - Neural &amp; probabilistic ML/DL architectures (TensorFlow, PyTorch)</text>
    <text x="28" y="308" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  - Cryptography, secure algorithm design, adversarial resilience</text>
    <text x="28" y="336" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  - Network security, IPSec, firewall architecture</text>
    <text x="28" y="364" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  - AI ethics &amp; adversarial search theory</text>
  </g>

  <defs>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0"
            stroke="#000000" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="900" height="414"
        fill="url(#scanlines)" pointer-events="none"/>

  <rect x="410.0" y="351"
        width="9" height="16"
        fill="#00FF41">
    <animate attributeName="opacity"
             values="1;1;0;0" dur="1.2s"
             repeatCount="indefinite"/>
  </rect>
</svg>