<svg xmlns="http://www.w3.org/2000/svg" width="900" height="470" viewBox="0 0 900 470">

  <defs>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" rx="12" ry="12" width="898" height="468" fill="#0D1117" stroke="#30363D" stroke-width="1"/>
  <clipPath id="headerClip"><rect width="900" height="42" rx="12" ry="12"/></clipPath>
  <rect width="900" height="42" fill="#161B22" clip-path="url(#headerClip)"/>
  <rect y="30" width="900" height="12" fill="#161B22"/>
  <line x1="0" y1="42" x2="900" y2="42" stroke="#30363D" stroke-width="1"/>
  <circle cx="20" cy="21" r="6" fill="#FF5F56"/>
  <circle cx="40" cy="21" r="6" fill="#FFBD2E"/>
  <circle cx="60" cy="21" r="6" fill="#27C93F"/>
  <text x="450" y="25" fill="#8B949E" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="13" text-anchor="middle">root@dattanirjhar:~</text>
  <g filter="url(#glow)">
    <text x="28" y="84" fill="#39FF14" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">root@dattanirjhar:~# grep -r "skills" /stack</text>
    <text x="28" y="140" fill="#6E7681" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14"># LANGUAGES &amp; FRAMEWORKS</text>
    <text x="28" y="168" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  Python    Bash    JavaScript    Node.js    React    MySQL</text>
    <text x="28" y="224" fill="#6E7681" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14"># AI / ML STACK</text>
    <text x="28" y="252" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  TensorFlow    Keras    scikit-learn    Pandas    NumPy    Matplotlib</text>
    <text x="28" y="308" fill="#6E7681" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14"># SECURITY &amp; INFRASTRUCTURE</text>
    <text x="28" y="336" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  Nmap    Wireshark    Burp Suite    Metasploit    Nuclei    reNgine</text>
    <text x="28" y="392" fill="#6E7681" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14"># PLATFORMS &amp; HARDWARE</text>
    <text x="28" y="420" fill="#00FF41" font-family="JetBrains Mono, Cascadia Code, Fira Code, Consolas, monospace" font-size="14">  Linux    Docker    Raspberry Pi    Arduino    Cisco    NVIDIA</text>
  </g>

  <defs>
    <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
      <line x1="0" y1="0" x2="900" y2="0"
            stroke="#000000" stroke-width="1" opacity="0.06"/>
    </pattern>
  </defs>
  <rect width="900" height="470"
        fill="url(#scanlines)" pointer-events="none"/>

  <rect x="561.2" y="407"
        width="9" height="16"
        fill="#00FF41">
    <animate attributeName="opacity"
             values="1;1;0;0" dur="1.2s"
             repeatCount="indefinite"/>
  </rect>
</svg>